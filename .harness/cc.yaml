version: "1"

# gridfire_template_version: stage3-py-cli/v1

github:
  owner: BrettHamlin
  repo: cli

reviewer_dispatch:
  strategy: progressive
  clustering:
    mode: lsp_preferred
    regex_fallback: true

reviewers:
  - name: py-cli-command-contracts
    file: .harness/agents/py-cli-command-contracts.md
    description: Checks Python CLI command contracts, arguments, exit codes, stdout/stderr behavior, and help text.
    path_hints: ["src/**", "httpie/**", "cli/**", "commands/**", "tests/**", "setup.py", "setup.cfg", "pyproject.toml"]
    language_hints: [python, shell, toml, ini]
    mandatory_triggers: ["command", "argument", "option", "flag", "stdout", "stderr", "exit", "help", "parser"]
    passing_grade: C
    max_retries: 5

  - name: py-file-io-safety
    file: .harness/agents/py-file-io-safety.md
    description: Checks Python CLI file/session/output safety, default-output contracts, path handling, and accidental writes.
    path_hints: ["src/**", "httpie/**", "tests/**", "**/*.py", "setup.py", "setup.cfg", "pyproject.toml"]
    language_hints: [python, shell, toml, ini]
    mandatory_triggers: ["file", "path", "session", "output", "download", "upload", "stdout", "stderr", "write", "encoding"]
    passing_grade: C
    max_retries: 5

codegen:
  cli_provider: codex-cli
  default_model: gpt-5.5

stages:
  planner:
    explore_model: gpt-5.5
  code_gen_feature:
    model: gpt-5.5
    timeout_s: 21600
  code_gen_test:
    model: gpt-5.5
  code_gen_e2e_test:
    model: gpt-5.5
    timeout_s: 21600

ci:
  provider: github-actions
  workflow_ref: "master"
  build:
    workflow: ".github/workflows/gridfire-build.yml"
    timeout_sec: 1800
  test:
    workflow: ".github/workflows/gridfire-test.yml"
    timeout_sec: 1800
  failure_extraction:
    - source: annotations
    - source: junit-xml
      path: "test-results/*.xml"
    - source: ai-extract

gates:
  plan:
    auto_approve: true
  ac:
    auto_approve: true
  merge_review:
    auto_approve: true

inner_loop:
  reviewer_per_max: 2
  reviewer_total_max: 5
  build_max: 3
  test_max: 3
  build_test_total_max: 5
  budget_reset_on_user_changes: true
