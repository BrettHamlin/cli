name: Gridfire Test

# gridfire_template_version: stage3-py-cli/v1

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Git ref to test
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package test dependencies
        run: python -m pip install -e ".[test]"
      - name: Run scoped CLI contract tests
        run: python -m pytest tests/test_cli.py tests/test_output.py tests/test_sessions.py tests/test_defaults.py
